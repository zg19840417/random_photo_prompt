    async function syncServerJobs() {
      const data = await requestJson("/random_photo_prompt/mobile/jobs");
      const serverIds = new Set((data.jobs || []).map(job => String(job.prompt_id || "")));
      let changed = false;
      for (const job of state.jobs.values()) {
        if (!job?.prompt_id || !isActiveJob(job) || serverIds.has(String(job.prompt_id))) continue;
        job.status = "stale";
        job.statusText = "任务已中断";
        job.pollFinalized = true;
        job.progress = null;
        changed = true;
      }
      return changed;
    }

    async function pollJobs() {
      const active = [...state.jobs.values()].filter(isActiveJob);
      if (!active.length) {
        clearInterval(state.timer);
        state.timer = null;
        updateGenerateButton();
        return;
      }
      let shouldRefreshGallery = false;
      try {
        if (await syncServerJobs()) {
          shouldRefreshGallery = true;
        }
      } catch (_error) {
        // 单个任务查询仍会继续给出更具体状态。
      }
      if (!active.some(isActiveJob)) {
        if (state.serialBatch && state.serialBatch.submitted < state.serialBatch.total) {
          state.serialBatch = null;
          setStatus("批量任务已中断，未提交的任务已取消。", true);
        }
        renderJobs();
        clearInterval(state.timer);
        state.timer = null;
        updateGenerateButton();
        return;
      }
      for (const job of active) {
        if (!isActiveJob(job)) continue;
        try {
          const wasCompleted = job.status === "completed";
          delete job.pollError;
          const data = await requestJson(`/random_photo_prompt/mobile/job/${job.prompt_id}`);
          job.status = data.status;
          job.statusText = statusText(data.status);
          job.images = data.images || [];
          job.videos = data.videos || [];
          if (data.progress?.max > 0) {
            job.progress = data.progress;
          }
          if (data.status === "completed") {
            const max = job.progress?.max || 1;
            job.progress = {value: max, max, percent: 100, node: job.progress?.node || ""};
            job.pollFinalized = Boolean(job.images.length || job.videos.length);
            if (!wasCompleted && (job.images.length || job.videos.length)) {
              shouldRefreshGallery = true;
            }
          }
          const video = job.videos[0];
          if (video?.width && video?.height) {
            job.width = video.width;
            job.height = video.height;
          }
        } catch (error) {
          job.pollError = error.message;
          job.statusText = error.message;
        }
      }
      renderJobs();
      if (shouldRefreshGallery) {
        await loadGallery();
        active.forEach(job => {
          if (job.status === "completed" && ((job.images || []).length || (job.videos || []).length)) {
            job.pollFinalized = true;
          }
        });
        renderJobs();
      }
      if (![...state.jobs.values()].some(isActiveJob)) {
        await submitNextSerialJobIfReady();
      }
      updateGenerateButton();

    function buildGeneratePayload(isVideoMode, count) {
      return isVideoMode
        ? {
            client_id: state.clientId,
            scale: videoScaleSelect.value,
            source_filename: imageKey(state.sourceImage),
            action_text: videoActionInput.value,
            fps: videoFpsSelect.value,
            seconds: videoSecondsSelect.value,
            count
          }
        : {
            client_id: state.clientId,
            scale: scaleSelect.value,
            shot: shotSelect.value,
            workflow: workflowSelect.value,
            prompt_rule: promptRuleSelect.value,
            zit_model: zitModelSelect.value,
            zib_model: workflowSelect.value === "zit_single" && zitModelSelect.value ? "" : zibModelSelect.value,
            lora_name: loraNameSelect.value,
            lora_strength: loraStrengthInput.value,
            custom_prompt: state.customPrompt.trim(),
            custom_resolution: state.customResolution,
            count
          };
    }

    async function submitNextSerialJobIfReady() {
      const batch = state.serialBatch;
      if (!batch || state.serialSubmitting) return;
      if (batch.submitted >= batch.total) {
        state.serialBatch = null;
        updateGenerateButton();
        return;
      }
      if ([...state.jobs.values()].some(isActiveJob)) return;
      state.serialSubmitting = true;
      try {
        ensureProgressSocket();
        const payload = {...batch.payload, count: 1};
        const data = await requestJson(batch.url, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload)
        });
        const jobs = data.jobs || [];
        if (!jobs.length) throw new Error(data.errors?.[0]?.error || "任务没有提交成功。");
        jobs.forEach(job => {
          const index = batch.submitted + 1;
          state.jobs.set(job.prompt_id, {
            ...job,
            batchId: batch.batchId,
            batchIndex: index,
            batchTotal: batch.total,
            status: "pending",
            statusText: "排队中",
            progress: Number(job.node_total || 0) > 0 ? {value: 0, max: Number(job.node_total), percent: 0, node: "", type: "node"} : null,
            images: [],
            videos: []
          });
          batch.submitted = index;
        });
        if (data.errors && data.errors.length) {
          setStatus("有任务没有排进去，请检查电脑端工作流。", true);
        } else {
          setStatus("");
        }
        renderJobs();
        startPolling();
        if (batch.isVideoMode) switchGalleryTab("videos");
      } catch (error) {
        state.serialBatch = null;
        setStatus(error.message, true);
        window.alert(error.message);
      } finally {
        state.serialSubmitting = false;
        updateGenerateButton();
      }
    }

    async function restoreSessionJobs() {
      try {
        const data = await requestJson("/random_photo_prompt/mobile/jobs");
        const jobs = data.jobs || [];
        const batchId = state.nextBatchId++;
        jobs.forEach((job, index) => {
          state.jobs.set(job.prompt_id, {
            ...job,
            batchId,
            batchIndex: index + 1,
            batchTotal: jobs.length,
            statusText: statusText(job.status),
            progress: job.status === "completed"
              ? {value: Number(job.node_total || 1), max: Number(job.node_total || 1), percent: 100, node: "", type: "node"}
              : (Number(job.node_total || 0) > 0 ? {value: 0, max: Number(job.node_total), percent: 0, node: "", type: "node"} : null),
            images: job.images || [],
            videos: job.videos || []
          });
        });
        renderJobs();
        startPolling();
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    generateBtn.addEventListener("click", async () => {
      const isVideoMode = state.mode === "video";
      const requestedCount = isVideoMode ? currentVideoCount() : currentCount();
      saveSettings();
      const remainingSlots = remainingActiveJobSlots();
      if (remainingSlots <= 0) {
        setStatus(`当前任务数已达到 ${state.maxActiveJobs}，请等待完成后再添加。`, true);
        return;
      }
      const count = Math.min(requestedCount, remainingSlots);
      if (count < requestedCount) {
        setStatus(`当前最多还能添加 ${count} 个任务，已自动限制到 ${state.maxActiveJobs}。`);
      }
      if (isVideoMode && !state.sourceImage?.filename) {
        setStatus("请先选择一张图片。", true);
        return;
      }
      if (count > 8 && !(await askConfirm(`确认一次生成 ${count} ${isVideoMode ? "个视频" : "张图片"}？`))) {
        return;
      }
      generateBtn.disabled = true;
      try {
        const url = isVideoMode ? "/random_photo_prompt/mobile/video/generate" : "/random_photo_prompt/mobile/generate";
        state.serialBatch = {
          batchId: state.nextBatchId++,
          total: count,
          submitted: 0,
          url,
          payload: buildGeneratePayload(isVideoMode, 1),
          isVideoMode
        };
        await submitNextSerialJobIfReady();
      } catch (error) {
        setStatus(error.message, true);
        window.alert(error.message);
      } finally {
        await checkStatus();
      }
    });

    restoreSettings();
    checkStatus();
    restoreSessionJobs();
    loadGallery();
  </script>
</body>
</html>
