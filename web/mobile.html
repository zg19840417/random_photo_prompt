<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>手机生成</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0B0E14;
      --panel: #15181E;
      --panel-2: #1F2430;
      --field: #0B0E14;
      --text: #BFBDB6;
      --muted: #777B85;
      --line: rgba(191, 189, 182, .18);
      --soft-line: rgba(191, 189, 182, .10);
      --accent: #E6B450;
      --accent-strong: #E6B450;
      --on-accent: #0B0E14;
      --accent-2: #AAD94C;
      --danger: #F07178;
      --nav: rgba(11, 14, 20, .82);
      --shadow: 0 18px 42px rgba(0, 0, 0, .48);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    main {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 18px 14px 32px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      margin: 0 -14px 14px;
      padding: max(6px, env(safe-area-inset-top)) 16px 10px;
      background: var(--nav);
      backdrop-filter: saturate(180%) blur(18px);
      -webkit-backdrop-filter: saturate(180%) blur(18px);
      border-bottom: 1px solid var(--soft-line);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      min-width: 0;
      padding: 3px;
      border: 1px solid var(--soft-line);
      border-radius: 8px;
      background: rgba(191, 189, 182, .06);
    }

    .tab {
      min-height: 38px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
    }

    .tab.active {
      background: rgba(191, 189, 182, .18);
      color: var(--text);
    }

    .panel[hidden] {
      display: none;
    }

    .toolbar,
    .jobs {
      display: grid;
      gap: 12px;
    }

    .section {
      padding: 14px;
      border: 1px solid var(--soft-line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 1px 0 rgba(191, 189, 182, .05) inset;
    }

    .label {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0;
    }

    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .label-row .label {
      margin-bottom: 0;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-size: 15px;
      transition: background-color 140ms ease, border-color 140ms ease, color 140ms ease, opacity 140ms ease, transform 140ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: scale(.985);
    }

    button:disabled {
      opacity: .55;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible,
    .custom-select-trigger:focus-visible {
      outline: 2px solid rgba(230, 180, 80, .88);
      outline-offset: 2px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .video-settings-row {
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr) minmax(0, 1fr);
    }

    .video-control-row {
      grid-template-columns: minmax(0, .95fr) minmax(0, .95fr) minmax(0, .85fr) minmax(0, .9fr);
      gap: 8px;
    }

    .image-control-row {
      grid-template-columns: minmax(0, .9fr) minmax(0, 1fr) minmax(0, 1.25fr) minmax(58px, .75fr);
      gap: 6px;
      align-items: end;
    }

    .prompt-rule-row {
      margin-top: 10px;
    }

    select,
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field);
      color: var(--text);
      font: inherit;
    }

    select,
    input {
      height: 42px;
      padding: 0 12px;
    }

    textarea {
      min-height: 132px;
      padding: 10px 12px;
      resize: vertical;
      line-height: 1.45;
      caret-color: var(--accent);
    }

    .custom-prompt-button {
      width: 100%;
      min-height: 42px;
      margin-top: 10px;
      border-color: var(--soft-line);
      background: rgba(191, 189, 182, .06);
      color: var(--text);
    }

    .custom-prompt-button.active {
      border-color: rgba(230, 180, 80, .78);
      color: var(--accent);
      box-shadow: 0 0 0 2px rgba(230, 180, 80, .16);
    }

    .prompt-action-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(76px, .55fr) minmax(0, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .prompt-action-row .custom-prompt-button {
      margin-top: 0;
    }

    select {
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
      background-position: calc(100% - 18px) 18px, calc(100% - 12px) 18px;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 32px;
    }

    .native-select-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .custom-select {
      position: relative;
      width: 100%;
    }

    .custom-select-trigger {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      width: 100%;
      height: 42px;
      min-height: 42px;
      padding: 0 10px 0 12px;
      border-color: var(--line);
      background: var(--field);
      color: var(--text);
      text-align: left;
      touch-action: manipulation;
    }

    .custom-select-trigger::after {
      content: "";
      width: 8px;
      height: 8px;
      margin-left: 8px;
      border-right: 2px solid var(--accent);
      border-bottom: 2px solid var(--accent);
      transform: translateY(-2px) rotate(45deg);
      transition: transform 140ms ease;
    }

    .custom-select.open .custom-select-trigger {
      border-color: rgba(230, 180, 80, .75);
      box-shadow: 0 0 0 2px rgba(230, 180, 80, .12);
    }

    .custom-select.open .custom-select-trigger::after {
      transform: translateY(2px) rotate(225deg);
    }

    .custom-select-value {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .custom-select-menu {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      z-index: 40;
      display: none;
      max-height: min(46vh, 320px);
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #15181E;
      box-shadow: var(--shadow);
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    .custom-select.open .custom-select-menu {
      display: grid;
      gap: 4px;
    }

    .custom-select-option {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      min-height: 40px;
      padding: 0 10px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--text);
      text-align: left;
      font-size: 14px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .custom-select-option.selected {
      background: rgba(230, 180, 80, .16);
      color: var(--text);
    }

    .custom-select-option.selected::after {
      content: "✓";
      color: var(--accent);
      font-weight: 900;
    }

    .lora-select-wide-menu .custom-select-menu {
      width: min(100%, 520px);
      max-height: min(46vh, 320px);
    }

    .lora-row {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(86px, 1fr);
      gap: 10px;
      align-items: end;
    }

    .count-stepper {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 32px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--field);
    }

    .count-value {
      display: grid;
      place-items: center;
      color: var(--text);
      font-size: 17px;
      font-weight: 700;
    }

    .count-arrows {
      display: grid;
      border-left: 1px solid var(--line);
    }

    .count-arrow {
      min-height: 0;
      height: 21px;
      border: 0;
      border-radius: 0;
      background: #1F2430;
      color: var(--accent);
      font-size: 13px;
      line-height: 1;
      touch-action: manipulation;
    }

    .count-arrow:first-child {
      border-bottom: 1px solid var(--line);
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 12px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field);
    }

    .mode-tab {
      min-height: 36px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-weight: 600;
    }

    .mode-tab.active {
      background: rgba(230, 180, 80, .18);
      color: var(--text);
    }

    .mode-panel[hidden] {
      display: none;
    }

    .shared-shot-row.video-mode {
      display: none;
    }

    .source-picker-button {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      width: 100%;
      min-height: 54px;
      padding: 8px;
      text-align: left;
    }

    .source-picker-button.has-source {
      grid-template-columns: 46px minmax(0, 1fr);
      border-color: rgba(230, 180, 80, .48);
      background: rgba(230, 180, 80, .1);
    }

    .source-picker-thumb {
      display: block;
      width: 44px;
      height: 44px;
      border-radius: 7px;
      object-fit: cover;
      background: #0B0E14;
    }

    .source-picker-thumb[hidden] {
      display: none;
    }

    .source-picker-text {
      overflow: hidden;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .source-picker-button.has-source .source-picker-text {
      color: var(--accent);
      font-weight: 600;
    }

    .source-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 72px;
      gap: 10px;
      align-items: end;
    }

    .source-clear {
      min-height: 54px;
      border-color: rgba(240, 113, 120, .42);
      color: #ffd6d6;
    }

    .source-clear[hidden] {
      display: none;
    }

    .recommend-action {
      width: 100%;
      min-height: 44px;
      margin-top: 8px;
      border-color: rgba(230, 180, 80, .48);
      background: rgba(230, 180, 80, .12);
      color: var(--accent);
      font-weight: 700;
    }

    .primary {
      width: 100%;
      min-height: 52px;
      margin-top: 12px;
      border-color: var(--accent-strong);
      background: var(--accent-strong);
      color: var(--on-accent);
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(230, 180, 80, .26);
    }

    .connection {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      min-width: 0;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 0 3px rgba(240, 113, 120, .12);
    }

    .connection.connected .dot {
      background: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(170, 217, 76, .14);
    }

    .connection.warning .dot {
      background: var(--danger);
      box-shadow: 0 0 0 3px rgba(240, 113, 120, .12);
    }

    .health-link {
      display: none;
      align-items: center;
      justify-content: center;
      min-height: 20px;
      padding-left: 2px;
      border: 0;
      color: var(--accent);
      background: transparent;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }

    .health-link.visible {
      display: inline-flex;
    }

    .status {
      min-height: 20px;
      margin: 10px 2px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .status.error {
      color: var(--danger);
    }

    .entry-detail {
      margin: -4px 2px 10px;
      color: #777B85;
      font-size: 12px;
      line-height: 1.4;
      word-break: break-all;
    }

    .entry-detail:empty {
      display: none;
    }

    .job {
      display: block;
    }

    .generation-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
      text-align: center;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(var(--photo-cols, 4), minmax(0, 1fr));
      align-items: start;
      gap: 8px;
    }

    .gallery-bar {
      position: sticky;
      top: 54px;
      z-index: 8;
      display: grid;
      grid-template-columns: auto 1fr auto auto auto;
      gap: 8px;
      align-items: center;
      margin: -12px -12px 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--nav);
      backdrop-filter: saturate(180%) blur(18px);
      -webkit-backdrop-filter: saturate(180%) blur(18px);
    }

    .gallery-media-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      width: 168px;
      padding: 3px;
      border: 1px solid var(--soft-line);
      border-radius: 8px;
      background: rgba(191, 189, 182, .06);
    }

    .gallery-media-tab {
      min-height: 30px;
      padding: 0 8px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .gallery-media-tab.active {
      background: rgba(230, 180, 80, .18);
      color: var(--text);
    }

    #waterfallPanel {
      padding-top: 0;
    }

    #waterfallPanel .gallery-bar {
      margin-bottom: 10px;
    }

    .gallery-count {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .gallery-action {
      min-height: 36px;
      padding: 0 12px;
      font-size: 14px;
      font-weight: 600;
    }

    .gallery-action.active {
      border-color: rgba(230, 180, 80, .62);
      color: var(--accent);
      background: rgba(230, 180, 80, .16);
    }

    .gallery-action.danger,
    .viewer-action.danger {
      border-color: rgba(240, 113, 120, .55);
      color: var(--danger);
    }

    .viewer-action.active {
      border-color: rgba(230, 180, 80, .62);
      color: var(--accent);
      background: rgba(230, 180, 80, .16);
    }

    .photo-item,
    .video-item,
    .thumb {
      position: relative;
      display: block;
      width: 100%;
      padding: 0;
      border: 1px solid var(--soft-line);
      border-radius: 7px;
      overflow: hidden;
      background: #0B0E14;
    }

    .photo-item.selected,
    .video-item.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(230, 180, 80, .55);
    }

    .photo-item.selected::after,
    .video-item.selected::after {
      content: "✓";
      position: absolute;
      top: 5px;
      right: 5px;
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--on-accent);
      font-size: 14px;
      font-weight: 900;
    }

    .photo-item img,
    .video-item video,
    .thumb img {
      display: block;
      width: 100%;
      height: auto;
    }

    .video-item {
      aspect-ratio: 3 / 4;
    }

    .video-item video {
      height: 100%;
      object-fit: cover;
      background: #0B0E14;
      pointer-events: none;
    }

    .video-item::before {
      content: "▶";
      position: absolute;
      left: 6px;
      bottom: 5px;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(0, 0, 0, .62);
      color: var(--text);
      font-size: 12px;
    }

    .waterfall {
      display: block;
      touch-action: pan-y pinch-zoom;
    }

    .waterfall[hidden] {
      display: none;
    }

    .empty {
      padding: 42px 10px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(191, 189, 182, .05);
    }

    .viewer {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      overflow-x: hidden;
      overflow-y: auto;
      background: rgba(0, 0, 0, .96);
      overscroll-behavior: contain;
    }

    .viewer.open {
      display: block;
    }

    .viewer-image {
      position: relative;
      padding: 10px 10px 0;
      overflow: hidden;
      touch-action: pan-y;
      user-select: none;
      min-height: 0;
    }

    .viewer-image img {
      display: block;
      width: auto;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      border-radius: 8px;
      background: var(--bg);
      pointer-events: none;
      will-change: transform;
    }

    .viewer-image video {
      display: none;
      width: 100%;
      max-height: 72vh;
      border-radius: 8px;
      background: #0B0E14;
    }

    .viewer.video-mode .viewer-image {
      overflow: visible;
      touch-action: pan-y;
    }

    .viewer.video-mode .viewer-image img {
      display: none;
    }

    .viewer.video-mode .viewer-image video {
      display: block;
    }

    .viewer-image img.viewer-incoming {
      position: absolute;
      top: 10px;
      left: 10px;
      width: calc(100% - 20px);
      opacity: 0;
    }

    .viewer-panel {
      padding: 8px 14px calc(18px + env(safe-area-inset-bottom));
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0), rgba(0, 0, 0, .9) 26px);
    }

    .viewer-actions {
      display: grid;
      grid-template-columns: 1fr auto auto auto auto;
      gap: 8px;
      align-items: center;
      min-height: 44px;
      margin-bottom: 8px;
    }

    .viewer-action {
      min-height: 38px;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 700;
    }

    .viewer-count {
      margin: 0 0 8px;
      color: var(--accent-2);
      font-size: 13px;
      font-weight: 600;
      text-align: center;
    }

    .viewer-prompt {
      margin: 0;
      color: #BFBDB6;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-line;
      word-break: break-word;
    }

    .viewer-prompt:empty::before {
      content: "暂无提示词";
      color: rgba(191, 189, 182, .55);
    }

    .confirm-dialog {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, .72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .confirm-dialog.open {
      display: flex;
    }

    .source-dialog.open {
      align-items: flex-end;
    }

    .source-dialog .confirm-box {
      width: min(720px, 100%);
      max-height: 78vh;
      overflow: hidden;
    }

    #promptDialog.open {
      align-items: flex-start;
      padding: max(8px, env(safe-area-inset-top)) 12px 8px;
    }

    #promptDialog .confirm-box {
      width: min(720px, 100%);
      max-height: calc(100vh - max(16px, env(safe-area-inset-top)));
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    #promptDialog .custom-select-menu {
      max-height: min(34vh, 260px);
    }

    .source-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      max-height: 58vh;
      overflow-y: auto;
      padding-right: 2px;
    }

    .source-choice {
      padding: 0;
      border: 1px solid var(--line);
      overflow: hidden;
      background: #0B0E14;
    }

    .source-choice img {
      display: block;
      width: 100%;
      height: auto;
    }

    .confirm-box {
      width: min(320px, 100%);
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #15181E;
      box-shadow: var(--shadow);
    }

    .confirm-message {
      margin: 0 0 16px;
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
    }

    .confirm-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .prompt-dialog-textarea {
      width: 100%;
      min-height: min(56vh, 520px);
      max-height: min(70vh, 680px);
      margin-top: 8px;
    }

    .prompt-dialog-actions {
      grid-template-columns: 1fr 1fr 1fr 1fr;
    }

    .confirm-cancel,
    .confirm-ok {
      min-height: 42px;
      font-size: 15px;
      font-weight: 600;
    }

    .confirm-cancel {
      background: #1F2430;
      color: var(--text);
    }

    .confirm-ok {
      background: var(--danger);
      color: white;
    }

    #customPromptOk {
      border-color: var(--accent-strong);
      background: var(--accent-strong);
      color: var(--on-accent);
      font-weight: 700;
    }

    @media (max-width: 430px) {
      main {
        padding: 14px 10px 28px;
      }

      .topbar {
        margin: 0 -10px 12px;
        padding: 2px 12px 10px;
      }

      .section {
        padding: 12px;
      }

      button {
        font-size: 14px;
      }

      .image-control-row {
        gap: 5px;
      }

      .image-control-row .label {
        font-size: 12px;
      }

      .image-control-row .custom-select-trigger,
      .image-control-row .count-stepper {
        height: 40px;
        min-height: 40px;
      }

      #promptDialog.open {
        padding: max(6px, env(safe-area-inset-top)) 6px max(6px, env(safe-area-inset-bottom));
      }

      #promptDialog .confirm-box {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto auto;
        width: 100%;
        height: calc(100dvh - max(12px, env(safe-area-inset-top)) - max(12px, env(safe-area-inset-bottom)));
        max-height: none;
        padding: 14px;
        overflow: hidden;
      }

      .prompt-dialog-textarea {
        min-height: 0;
        max-height: none;
        height: 100%;
        resize: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <nav class="tabs" aria-label="页面切换">

    <section id="generatePanel" class="panel">
      <div class="toolbar">

  <div id="viewer" class="viewer" aria-hidden="true">

      <img id="viewerImage" alt="生成图片原图" />

      <div class="viewer-actions">

        <button id="viewerFavorite" class="viewer-action" type="button">收藏</button>

      <textarea id="customPromptText" class="prompt-dialog-textarea" placeholder="输入后将直接使用这段提示词生成图片，不再读取档位和镜头。"></textarea>

          <option value="1088x1920">1088 × 1920</option>

  <script>
    const state = {
      jobs: new Map(),
      galleryImages: [],
      galleryVideos: [],
      favoriteImages: [],
      selectedImages: new Set(),
      selectedVideos: new Set(),
      selectedFavorites: new Set(),
      editMode: false,
      timer: null,
      tab: "generate",
      mode: "image",
      galleryTab: "images",
      sessionOnly: false,
      customPrompt: "",
      customResolution: "",
      sourceImage: null,
      videoActionNonce: 0,
      waterfallCols: 4,
      nextBatchId: 1,
      maxActiveJobs: 100,
      clientId: "",
      serialBatch: null,
      serialSubmitting: false,
      progressSocket: null,
      progressReconnectTimer: null,
      viewerMediaType: "image",
      viewerIndex: 0,
      viewerRotation: 0,
      viewerScale: 1,
      viewerLayoutScale: 1,
      viewerOffsetX: 0,
      viewerOffsetY: 0,
      viewerBaseOffsetY: 0,
      viewerRenderedWidth: 0,
      viewerRenderedHeight: 0,
      viewerViewportHeight: 0,
      entryMode: "",
      entryLabel: "",
      entryDetail: ""
    };

    const tabs = document.querySelectorAll(".tab");
    const generatePanel = document.querySelector("#generatePanel");
    const waterfallPanel = document.querySelector("#waterfallPanel");
    const connectionEl = document.querySelector("#connection");
    const connectionText = document.querySelector("#connectionText");
    const healthLink = document.querySelector("#healthLink");
    const statusEl = document.querySelector("#status");
    const entryDetail = document.querySelector("#entryDetail");
    const jobsEl = document.querySelector("#jobs");
    const waterfallEl = document.querySelector("#waterfall");
    const videoWaterfallEl = document.querySelector("#videoWaterfall");
    const galleryMediaTabs = document.querySelectorAll(".gallery-media-tab");
    const galleryCount = document.querySelector("#galleryCount");
    const gallerySessionOnly = document.querySelector("#gallerySessionOnly");
    const gallerySelectAll = document.querySelector("#gallerySelectAll");
    const galleryEdit = document.querySelector("#galleryEdit");
    const galleryDelete = document.querySelector("#galleryDelete");
    const generateBtn = document.querySelector("#generate");
    const modeTabs = document.querySelectorAll(".mode-tab");
    const imageModePanel = document.querySelector("#imageModePanel");
    const videoModePanel = document.querySelector("#videoModePanel");
    const sharedShotRow = document.querySelector("#sharedShotRow");
    const viewer = document.querySelector("#viewer");
    const viewerImageBox = document.querySelector(".viewer-image");
    const viewerImage = document.querySelector("#viewerImage");
    const viewerIncomingImage = document.querySelector("#viewerIncomingImage");
    const viewerVideo = document.querySelector("#viewerVideo");
    const viewerCount = document.querySelector("#viewerCount");
    const viewerPrompt = document.querySelector("#viewerPrompt");
    const viewerFavorite = document.querySelector("#viewerFavorite");
    const viewerCopyPrompt = document.querySelector("#viewerCopyPrompt");
    const viewerRotate = document.querySelector("#viewerRotate");
    const viewerDelete = document.querySelector("#viewerDelete");
    const confirmDialog = document.querySelector("#confirmDialog");
    const confirmMessage = document.querySelector("#confirmMessage");
    const confirmCancel = document.querySelector("#confirmCancel");
    const confirmOk = document.querySelector("#confirmOk");
    const scaleSelect = document.querySelector("#scale");
    const videoScaleSelect = document.querySelector("#videoScale");
    const shotSelect = document.querySelector("#shot");
    const workflowSelect = document.querySelector("#workflow");
    const promptRuleSelect = document.querySelector("#promptRule");
    const zitModelSelect = document.querySelector("#zitModel");
    const zibModelField = document.querySelector("#zibModelField");
    const zibModelSelect = document.querySelector("#zibModel");
    const loraNameSelect = document.querySelector("#loraName");
    const loraStrengthInput = document.querySelector("#loraStrength");
    const countValue = document.querySelector("#countValue");
    const countUp = document.querySelector("#countUp");
    const countDown = document.querySelector("#countDown");
    const videoCountValue = document.querySelector("#videoCountValue");
    const videoCountUp = document.querySelector("#videoCountUp");
    const videoCountDown = document.querySelector("#videoCountDown");
    const videoFpsSelect = document.querySelector("#videoFps");
    const videoSecondsSelect = document.querySelector("#videoSeconds");
    const customPromptButton = document.querySelector("#customPromptButton");
    const copyCustomPrompt = document.querySelector("#copyCustomPrompt");
    const pregeneratePrompt = document.querySelector("#pregeneratePrompt");
    const promptDialog = document.querySelector("#promptDialog");
    const customPromptText = document.querySelector("#customPromptText");
    const customPromptResolution = document.querySelector("#customPromptResolution");
    const customPromptCancel = document.querySelector("#customPromptCancel");
    const customPromptClear = document.querySelector("#customPromptClear");
    const customPromptCopy = document.querySelector("#customPromptCopy");
    const customPromptOk = document.querySelector("#customPromptOk");
    const videoActionInput = document.querySelector("#videoAction");
    const pregenerateAction = document.querySelector("#pregenerateAction");
    const sourcePicker = document.querySelector("#sourcePicker");
    const sourcePreview = document.querySelector("#sourcePreview");
    const sourcePickerText = document.querySelector("#sourcePickerText");
    const sourceClear = document.querySelector("#sourceClear");
    const sourceDialog = document.querySelector("#sourceDialog");
    const sourceGrid = document.querySelector("#sourceGrid");
    const sourceCancel = document.querySelector("#sourceCancel");
    const settingsKey = "randomPhotoPrompt.mobile.settings";
    const favoritesDbName = "randomPhotoPrompt.mobile.favorites";
    const favoritesStoreName = "images";
    let favoritesDbPromise = null;
    const customSelects = new Map();

    function optionExists(select, value) {
      return [...select.options].some(option => option.value === value);
    }

    function enhanceSelect(select) {
      if (!select || customSelects.has(select)) return;
      const wrapper = document.createElement("div");
      wrapper.className = "custom-select";
      const trigger = document.createElement("button");
      trigger.className = "custom-select-trigger";
      trigger.type = "button";
      trigger.setAttribute("aria-haspopup", "listbox");
      trigger.setAttribute("aria-expanded", "false");
      const valueEl = document.createElement("span");
      valueEl.className = "custom-select-value";
      trigger.appendChild(valueEl);
      const menu = document.createElement("div");
      menu.className = "custom-select-menu";
      menu.setAttribute("role", "listbox");
      select.parentNode.insertBefore(wrapper, select);
      wrapper.appendChild(select);
      wrapper.appendChild(trigger);
      wrapper.appendChild(menu);
      select.classList.add("native-select-hidden");
      customSelects.set(select, {wrapper, trigger, valueEl, menu});
      trigger.addEventListener("click", event => {
        event.stopPropagation();
        toggleCustomSelect(select);
      });
      renderCustomSelect(select);
    }

    function renderCustomSelect(select) {
      const custom = customSelects.get(select);
      if (!custom) return;
      const selectedOption = select.selectedOptions[0] || select.options[0];
      custom.valueEl.textContent = selectedOption ? selectedOption.textContent : "";
      custom.menu.innerHTML = "";
      [...select.options].forEach(option => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "custom-select-option";
        button.textContent = option.textContent;
        button.dataset.value = option.value;
        button.setAttribute("role", "option");
        button.setAttribute("aria-selected", option.selected ? "true" : "false");
        button.classList.toggle("selected", option.selected);
        button.addEventListener("click", event => {
          event.stopPropagation();
          setSelectValue(select, option.value, true);
          closeCustomSelect(select);
        });
        custom.menu.appendChild(button);
      });
    }

    function setSelectValue(select, value, emitChange = false) {
      if (optionExists(select, value)) {
        select.value = value;
      }
      renderCustomSelect(select);
      if (emitChange) {
        select.dispatchEvent(new Event("change", {bubbles: true}));
      }
    }

    function ensureSelectOption(select, value, label = "") {
      const normalized = String(value || "").trim();
      if (!normalized || optionExists(select, normalized)) return;
      const option = document.createElement("option");
      option.value = normalized;
      option.textContent = label || normalized.replace(/x/i, " × ");
      select.appendChild(option);
    }

    function closeCustomSelect(select) {
      const custom = customSelects.get(select);
      if (!custom) return;
      custom.wrapper.classList.remove("open");
      custom.trigger.setAttribute("aria-expanded", "false");
    }

    function closeAllCustomSelects(exceptSelect = null) {
      customSelects.forEach((_custom, select) => {
        if (select !== exceptSelect) closeCustomSelect(select);
      });
    }

    function toggleCustomSelect(select) {
      const custom = customSelects.get(select);
      if (!custom) return;
      const shouldOpen = !custom.wrapper.classList.contains("open");
      closeAllCustomSelects(select);
      custom.wrapper.classList.toggle("open", shouldOpen);
      custom.trigger.setAttribute("aria-expanded", shouldOpen ? "true" : "false");
    }

    function saveSettings() {
      try {
        localStorage.setItem(settingsKey, JSON.stringify({
          mode: state.mode,
          scale: scaleSelect.value,
          videoScale: videoScaleSelect.value,
          shot: shotSelect.value,
          workflow: workflowSelect.value,
          promptRule: promptRuleSelect.value,
          zitModel: zitModelSelect.value,
          zibModel: zibModelSelect.value,
          loraName: loraNameSelect.value,
          loraStrength: loraStrengthInput.value,
          count: currentCount(),
          videoCount: currentVideoCount(),
          videoFps: videoFpsSelect.value,
          videoSeconds: videoSecondsSelect.value,
          customPrompt: state.customPrompt,
          customResolution: state.customResolution,
          videoAction: videoActionInput.value,
          sourceFilename: state.sourceImage?.filename || ""
        }));
      } catch (error) {
        // Local storage may be unavailable in strict privacy modes.
      }
    }

    function restoreSettings() {
      try {
        const settings = JSON.parse(localStorage.getItem(settingsKey) || "{}");
        switchMode(settings.mode === "video" ? "video" : "image", false);
        if (optionExists(scaleSelect, settings.scale)) setSelectValue(scaleSelect, settings.scale);
        if (optionExists(videoScaleSelect, settings.videoScale || settings.scale)) {
          setSelectValue(videoScaleSelect, settings.videoScale || settings.scale);
        }
        const shotValue = normalizeStoredShot(settings.shot, settings.preset);
        if (optionExists(shotSelect, shotValue)) setSelectValue(shotSelect, shotValue);
        if (optionExists(workflowSelect, settings.workflow)) setSelectValue(workflowSelect, settings.workflow);
        if (optionExists(promptRuleSelect, settings.promptRule)) setSelectValue(promptRuleSelect, settings.promptRule);
        if (settings.zitModel) {
          zitModelSelect.dataset.pendingValue = settings.zitModel;
        }
        if (settings.zibModel) {
          zibModelSelect.dataset.pendingValue = settings.zibModel;
        }
        if (settings.loraName) {
          loraNameSelect.dataset.pendingValue = settings.loraName;
        }
        if (settings.loraStrength) loraStrengthInput.value = settings.loraStrength;
        if (settings.count) setCount(settings.count);
        if (settings.videoCount) setVideoCount(settings.videoCount);
        if (optionExists(videoFpsSelect, settings.videoFps)) setSelectValue(videoFpsSelect, settings.videoFps);
        if (optionExists(videoSecondsSelect, settings.videoSeconds)) setSelectValue(videoSecondsSelect, settings.videoSeconds);
        state.customPrompt = String(settings.customPrompt || "");
        state.customResolution = String(settings.customResolution || "");
        updateCustomPromptButton();
        if (settings.videoAction) videoActionInput.value = settings.videoAction;
        if (settings.sourceFilename) {
          state.sourceImage = {filename: settings.sourceFilename, url: ""};
          updateSourcePicker();
        }

    function setCount(value) {
      const allowed = [1, 2, 4, 8, 16, 32, 64];
      const parsed = Number(value);
      const safeValue = allowed.includes(parsed)
        ? parsed
        : allowed.reduce((best, item) => Math.abs(item - parsed) < Math.abs(best - parsed) ? item : best, 1);
      countValue.textContent = String(safeValue);

    function setVideoCount(value) {

    function updateEntryInfo(data = {}, ready = true) {

      entryDetail.textContent = "";

    async function requestJson(url, options) {
      let response;
      try {
        response = await fetch(url, options);
      } catch (error) {
        throw new Error(friendlyNetworkError(url, error));
      }
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        const detail = readableError(data) || friendlyHttpError(url, response.status);
        throw new Error(detail);
      }
      return data;
    }

    function friendlyNetworkError(url, error) {
      if (url.includes("/random_photo_prompt/mobile/status")) {
        if (location.port === "18199") {
          return "统一入口连不上手机端内部服务。请重新启动 Mac 本机服务和 18199 代理。";
        }
        return "手机页接口不可用。请从 18199 统一入口打开。";
      }
      if (location.port === "18199") {
        return `代理请求失败：${error.message || "网络断开"}。请检查 18199 统一入口和远端 4090。`;
      }
      return error.message || "网络请求失败。";
    }

    function friendlyHttpError(url, status) {
      if (url.includes("/random_photo_prompt/mobile/status")) {
        if (status === 502 || status === 503 || status === 504) {
          return "入口链路有一段不可用。请检查 18199 统一入口和远端 4090。";
        }
        if (status === 404 && location.port !== "8188" && location.port !== "18199") {
          return "当前地址不像手机版入口。请打开 18199 统一入口。";
        }
      }
      return `请求失败（${status}）`;
    }

    function readableError(data) {
      if (!data || typeof data !== "object") return "";
      if (typeof data.error === "string" && data.error && data.error !== "0") return compactRemoteError(data.error);
      if (typeof data.message === "string" && data.message && data.message !== "0") return compactRemoteError(data.message);
      if (Array.isArray(data.errors) && data.errors.length) {
        const first = data.errors[0];
        if (first && typeof first === "object") {
          return readableError(first) || JSON.stringify(first);
        }
        if (first) return String(first);
      }
      if (data.error && typeof data.error === "object") {
        return data.error.message || data.error.type || JSON.stringify(data.error);
      }
      if (data.detail && typeof data.detail === "object") {
        return readableError(data.detail) || JSON.stringify(data.detail);
      }
      if (data.node_errors && Object.keys(data.node_errors).length) {
        return `工作流校验失败，涉及 ${Object.keys(data.node_errors).length} 个节点，请检查电脑端工作流模板。`;
      }
      if (data.detail) return compactRemoteError(String(data.detail));
      return "";
    }

    function compactRemoteError(message) {
      const text = String(message || "");
      if (!text) return "";
      if (/Traceback|aiohttp|Cannot connect|Connection refused|connect call failed|remote_history|_remote_json|_mobile_image_urls/i.test(text)) {
        return "远端无法连接。请检查远端 ComfyUI 是否启动、地址端口是否正确。";
      }
      return text.length > 180 ? `${text.slice(0, 177)}...` : text;
    }

    async function checkStatus() {
      try {
        const statusWorkflow = state.mode === "video" ? "ltx_video" : workflowSelect.value;
        const data = await requestJson(`/random_photo_prompt/mobile/status?workflow=${encodeURIComponent(statusWorkflow)}`);
        updateZitModelOptions(data.zit_models || []);
        updateZibModelOptions(data.zib_models || []);
        updateLoraOptions(data.loras || []);
        updateWorkflowModelVisibility();
        const ready = state.mode === "video" ? data.video_workflow?.template_ready : data.template_ready;
        updateEntryInfo(data, ready);
        const output = data.output || {};
        if (output.exists === false || output.writable === false) {
          setConnection(false);
          setStatus(`输出目录不可用：${output.dir || "未配置"}。请检查路径是否存在且可写。`, true);
          generateBtn.disabled = true;
          return;
        }
        if (ready) {
          setConnection(true);
          setStatus("");
          updateGenerateButton();
        } else {
          setConnection(false);
          setStatus(firstUseMessage(data), true);
          generateBtn.disabled = true;
        }
      } catch (error) {
        setConnection(false);
        connectionText.textContent = state.entryLabel || "入口断开";
        setStatus(error.message, true);
        generateBtn.disabled = true;
      }
    }

    function firstUseMessage(data = {}) {
      const video = state.mode === "video";
      const workflow = video ? data.video_workflow : (data.workflows || []).find(item => item.key === data.workflow);
      const templateName = video ? data.video_workflow?.template_name : data.template_name;
      const path = workflow?.path || data.template_path || "";
      const message = workflow?.message || data.message || (templateName ? `缺少 ${templateName}。` : "请先准备工作流模板。");
      const guidance = workflow?.guidance || data.guidance || "请在 ComfyUI 设置里打开开发者选项，然后使用“保存(API 格式)”重新导出。";
      if (!path) return `${message} ${guidance}`;
      return `${message} ${guidance} 保存路径：${path}`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function makeClientId() {
      if (window.crypto?.randomUUID) return window.crypto.randomUUID().replace(/-/g, "");
      return `${Date.now().toString(16)}${Math.random().toString(16).slice(2)}`;
    }

    function ensureProgressSocket() {
      if (!state.clientId) state.clientId = makeClientId();
      if (state.progressSocket && [WebSocket.CONNECTING, WebSocket.OPEN].includes(state.progressSocket.readyState)) return;
      const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
      const socket = new WebSocket(`${protocol}//${window.location.host}/ws?clientId=${encodeURIComponent(state.clientId)}`);
      state.progressSocket = socket;
      socket.addEventListener("message", event => {
        let message = null;
        try {
          message = JSON.parse(event.data);
        } catch (_error) {
          return;
        }
        if (message?.type !== "progress") return;
        const data = message.data || {};
        if (data.type !== "node") return;
        const promptId = String(data.prompt_id || "");
        const job = state.jobs.get(promptId) || [...state.jobs.values()].find(isActiveJob);
        if (!job) return;
        const value = Number(data.value || 0);
        const max = Number(data.max || 0);
        if (max > 0) {
          job.progress = {
            value: Math.max(0, Math.min(max, value)),
            max,
            percent: Math.max(0, Math.min(100, Math.round((value / max) * 100))),
            node: data.node || ""
          };
          renderJobs();
        }
      });
      socket.addEventListener("close", () => {
        if (state.progressSocket !== socket) return;
        state.progressSocket = null;
        if (state.progressReconnectTimer) clearTimeout(state.progressReconnectTimer);
        state.progressReconnectTimer = setTimeout(() => {
          state.progressReconnectTimer = null;
          if ([...state.jobs.values()].some(isActiveJob)) ensureProgressSocket();
        }, 1500);
      });
      socket.addEventListener("error", () => {
        try {
          socket.close();
        } catch (_error) {
          // Ignore close races.
        }
      });
    }

    function currentStepText(progress) {
      const value = Number(progress?.value || 0);
      const max = Number(progress?.max || 0);
      if (max > 0) {
        const current = Math.max(0, Math.min(max, value));
        return `步骤：${current}/${max}`;
      }
      return "步骤：等待";
    }

    function jobResultState(job) {
      if (!job) return "idle";
      if (job.pollError) return "error";
      if (job.status === "completed") {
        if ((job.images || []).length || (job.videos || []).length) return "ready";
        return "missing";
      }
      if (job.progress?.max > 0) return "running";
      if (job.status === "pending") return "pending";
      if (job.status === "running") return "running";
      return job.status || "waiting";
    }

    function jobDisplayText(job) {
      const stateName = jobResultState(job);
      if (stateName === "ready") return "已完成，正在入图库";
      if (stateName === "missing") return "已完成，但没有找到结果文件";
      if (stateName === "error") return compactRemoteError(job.pollError || "任务状态读取失败");
      if (stateName === "stale") return "任务已中断，请查看瀑布流";
      if (stateName === "unknown") return "任务已中断，请查看瀑布流";
      if (stateName === "pending") return "排队中";
      if (stateName === "running") return "生成中";
      return "等待结果";
    }

    function renderJobs() {
      const allJobs = [...state.jobs.values()];
      const pendingJobs = allJobs.filter(isActiveJob);
      const active = pendingJobs.find(job => job.status === "running") || pendingJobs[0];
      let text = "等待指令中";
      if (active) {
        const firstActiveBatchId = Math.min(...pendingJobs.map(job => Number(job.batchId) || 0));
        const queueJobs = allJobs.filter(job => (Number(job.batchId) || 0) >= firstActiveBatchId && isCountableQueueJob(job));
        const completedInQueue = queueJobs.filter(isCompletedResultJob).length;
        const total = queueJobs.length || pendingJobs.length || 1;
        const current = Math.min(total, completedInQueue + 1);
        const progress = active.progress;
        const progressText = currentStepText(progress);
        const activeVideo = Array.isArray(active.videos) && active.videos.length ? active.videos[0] : null;
        const width = activeVideo?.width || active.width || "";
        const height = activeVideo?.height || active.height || "";
        if (jobResultState(active) === "error") {
          text = jobDisplayText(active);
        } else {
          text = `${width}x${height}\n${jobDisplayText(active)}（${current}/${total}）\n${progressText}`;
        }
      } else if (allJobs.length) {
        const latest = allJobs[allJobs.length - 1];
        const width = latest.width || "";
        const height = latest.height || "";
        text = jobResultState(latest) === "error" ? jobDisplayText(latest) : `${width}x${height}\n${jobDisplayText(latest)}`;
      }
      jobsEl.innerHTML = `<div class="generation-state">${text.replace(/\n/g, "<br>")}</div>`;
      if (state.tab === "waterfall") loadGallery();
    }

    function isActiveJob(job) {
      if (!job || job.status === "unknown") return false;
      if (job.status === "stale") return false;
      if (job.status !== "completed") return true;
      return !((job.images || []).length || (job.videos || []).length || job.pollFinalized);
    }

    function isCompletedResultJob(job) {
      return job?.status === "completed" && ((job.images || []).length || (job.videos || []).length);
    }

    function isCountableQueueJob(job) {
      return isActiveJob(job) || isCompletedResultJob(job);
    }

    function activeQueueJobs() {
      const allJobs = [...state.jobs.values()];
      const pendingJobs = allJobs.filter(isActiveJob);
      if (!pendingJobs.length) return [];
      const firstActiveBatchId = Math.min(...pendingJobs.map(job => Number(job.batchId) || 0));
      return allJobs.filter(job => (Number(job.batchId) || 0) >= firstActiveBatchId && isCountableQueueJob(job));
    }

    function remainingActiveJobSlots() {
      return Math.max(0, state.maxActiveJobs - activeQueueJobs().length);
    }

    function imageRecords() {
      const images = state.sessionOnly ? state.galleryImages.filter(isSessionMedia) : state.galleryImages;
      return images.map(image => ({image, job: {prompt: mediaPrompt(image)}, index: 0}));
    }

    function videoRecords() {
      const videos = state.sessionOnly ? state.galleryVideos.filter(isSessionMedia) : state.galleryVideos;
      return videos.map(video => ({video, prompt: mediaPrompt(video)}));
    }

    function sessionOutputPrefixes() {
      return [...state.jobs.values()]
        .map(job => String(job.output_prefix || "").trim())
        .filter(Boolean);
    }

    function isSessionMedia(item) {
      const filename = String(item?.filename || "").trim();
      if (!filename) return false;
      const prefixes = sessionOutputPrefixes();
      if (!prefixes.length && ![...state.jobs.values()].some(isActiveJob)) return true;
      return prefixes.some(prefix => filename.startsWith(`${prefix}_`) || filename.startsWith(prefix));
    }

    function favoriteRecords() {
      return state.favoriteImages.map(image => ({image, job: {prompt: mediaPrompt(image)}, index: 0}));
    }

    function mediaPrompt(item) {
      return String(item?.prompt || item?.display_prompt || item?.generation_prompt || item?.positive_prompt || "").trim();
    }

    function prepareVideoThumbnails(root) {
      root.querySelectorAll("video").forEach(video => {
        video.muted = true;
        video.playsInline = true;
        const seekPreview = () => {
          if (!Number.isFinite(video.duration) || video.duration <= 0) return;
          try {
            video.currentTime = Math.min(.08, Math.max(0, video.duration - .05));
          } catch (_error) {
            // Some mobile browsers delay seeking until the video is fully ready.
          }
        };
        if (video.readyState >= 1) {
          seekPreview();
        } else {
          video.addEventListener("loadedmetadata", seekPreview, {once: true});
        }
      });
    }

    function imageKey(image) {
      if (!image) return "";
      if (image.key) return image.key;
      if (image.filename) {
        const subfolder = String(image.subfolder || "").replace(/^\/+|\/+$/g, "");
        return subfolder ? `${subfolder}/${image.filename}` : image.filename;
      }
      return image.url || "";
    }

    function imageByKey(key) {
      return state.galleryImages.find(image => imageKey(image) === key) || {filename: key};
    }

    function videoKey(video) {
      return video && video.filename ? video.filename : "";
    }

    function activeImageRecords() {
      return state.galleryTab === "favorites" ? favoriteRecords() : imageRecords();
    }

    function currentGalleryRecords() {
      if (state.galleryTab === "videos") return videoRecords();
      if (state.galleryTab === "favorites") return favoriteRecords();
      return imageRecords();
    }

    function currentSelectedSet() {
      if (state.galleryTab === "videos") return state.selectedVideos;
      if (state.galleryTab === "favorites") return state.selectedFavorites;
      return state.selectedImages;
    }

    function openFavoritesDb() {
      if (!("indexedDB" in window)) return Promise.reject(new Error("手机浏览器不支持本地图片收藏。"));
      if (favoritesDbPromise) return favoritesDbPromise;
      favoritesDbPromise = new Promise((resolve, reject) => {
        const request = indexedDB.open(favoritesDbName, 1);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(favoritesStoreName)) {
            db.createObjectStore(favoritesStoreName, {keyPath: "filename"});
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error("打开收藏数据库失败。"));
      });
      return favoritesDbPromise;
    }

    async function favoriteDbTransaction(mode, handler) {
      const db = await openFavoritesDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(favoritesStoreName, mode);
        const store = tx.objectStore(favoritesStoreName);
        let result;
        tx.oncomplete = () => resolve(result);
        tx.onerror = () => reject(tx.error || new Error("收藏数据库操作失败。"));
        tx.onabort = () => reject(tx.error || new Error("收藏数据库操作被中断。"));
        result = handler(store);
      });
    }

    function requestToPromise(request) {
      return new Promise((resolve, reject) => {
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error("收藏数据库请求失败。"));
      });
    }

    function blobToObjectUrl(blob) {
      return URL.createObjectURL(blob);
    }

    function releaseFavoriteObjectUrls() {
      state.favoriteImages.forEach(image => {
        if (image.objectUrl && image.url !== viewerImage.src && image.url !== viewerIncomingImage.src) {
          URL.revokeObjectURL(image.url);
        }
      });
    }

    async function loadFavorites() {
      try {
        const records = await favoriteDbTransaction("readonly", store => requestToPromise(store.getAll()));
        releaseFavoriteObjectUrls();
        state.favoriteImages = (records || [])
          .filter(item => item && item.filename && item.blob)
          .sort((a, b) => Number(b.createdAt || 0) - Number(a.createdAt || 0))
          .map(item => ({
            filename: String(item.filename),
            originalUrl: String(item.originalUrl || ""),
            url: blobToObjectUrl(item.blob),
            objectUrl: true,
            prompt: String(item.prompt || ""),
            mime: String(item.mime || item.blob.type || "image/jpeg"),
            createdAt: item.createdAt || Date.now()
          }));
      } catch (error) {
        state.favoriteImages = [];
        setStatus(error.message || "读取收藏失败。", true);
      }
    }

    function isFavoriteImage(image) {
      const key = imageKey(image);
      return !!key && state.favoriteImages.some(item => imageKey(item) === key);
    }

    function updateViewerFavoriteButton(record) {
      if (!record || state.viewerMediaType === "video") {
        viewerFavorite.hidden = true;
        return;
      }
      viewerFavorite.hidden = false;
      viewerFavorite.textContent = isFavoriteImage(record.image) ? "已收藏" : "收藏";
      viewerFavorite.classList.toggle("active", isFavoriteImage(record.image));
    }

    async function setFavoriteImage(image, prompt, enabled) {
      const key = imageKey(image);
      if (!key) return;
      if (!enabled) {
        await favoriteDbTransaction("readwrite", store => store.delete(key));
        await loadFavorites();
        renderWaterfall();
        return;
      }
      const response = await fetch(image.url);
      if (!response.ok) throw new Error("图片保存失败，无法读取原图。");
      const blob = await response.blob();
      await favoriteDbTransaction("readwrite", store => store.put({
        filename: image.filename || key,
        originalUrl: image.url || "",
        blob,
        mime: blob.type || "image/jpeg",
        prompt: prompt || image.prompt || "",
        createdAt: Date.now()
      }));
      await loadFavorites();
      renderWaterfall();
    }

    async function toggleCurrentFavorite() {
      if (state.viewerMediaType === "video") return;
      const images = activeImageRecords();
      const record = images[state.viewerIndex];
      if (!record) return;
      const shouldFavorite = !isFavoriteImage(record.image);
      try {
        viewerFavorite.disabled = true;
        viewerFavorite.textContent = shouldFavorite ? "保存中" : "取消中";
        await setFavoriteImage(record.image, record.job.prompt || mediaPrompt(record.image), shouldFavorite);
        const refreshed = activeImageRecords()[state.viewerIndex] || record;
        updateViewerFavoriteButton(refreshed);
        setStatus(shouldFavorite ? "已保存到手机本地收藏" : "已取消收藏");
      } catch (error) {
        updateViewerFavoriteButton(record);
        setStatus(error.message || "收藏失败。", true);
      } finally {
        viewerFavorite.disabled = false;
      }
    }

    function renderWaterfall() {
      renderGalleryShell();
      if (state.galleryTab === "videos") {
        const videos = videoRecords();
        videoWaterfallEl.style.setProperty("--photo-cols", String(Math.max(1, Math.min(10, Number(state.waterfallCols) || 4))));
        galleryCount.textContent = `${videos.length} 个视频`;
        galleryCount.textContent = state.editMode ? `已选 ${state.selectedVideos.size} / ${videos.length}` : `${videos.length} 个视频`;
        gallerySelectAll.hidden = !state.editMode;
        gallerySelectAll.textContent = state.selectedVideos.size === videos.length && videos.length > 0 ? "取消全选" : "全选";
        gallerySelectAll.disabled = videos.length < 1;
        galleryEdit.textContent = state.editMode ? "完成" : "编辑";
        galleryDelete.hidden = !state.editMode;
        galleryDelete.disabled = state.selectedVideos.size < 1;
        if (!videos.length) {
          videoWaterfallEl.innerHTML = `<div class="empty">${state.sessionOnly ? "本次生成的视频会出现在这里。" : "生成后的视频会出现在这里。"}</div>`;
          return;
        }
        videoWaterfallEl.innerHTML = `
          <div class="photo-grid">
            ${videos.map(record => `
              <button class="video-item ${state.selectedVideos.has(videoKey(record.video)) ? "selected" : ""}" type="button" data-filename="${record.video.filename}" aria-label="查看视频">
                <video src="${record.video.url}" muted playsinline preload="metadata"></video>
              </button>
            `).join("")}
          </div>
        `;
        window.requestAnimationFrame(() => prepareVideoThumbnails(videoWaterfallEl));
        return;
      }
      const images = state.galleryTab === "favorites" ? favoriteRecords() : imageRecords();
      const selectedImages = state.galleryTab === "favorites" ? state.selectedFavorites : state.selectedImages;
      const emptyText = state.galleryTab === "favorites" ? "收藏的图片会出现在这里。" : (state.sessionOnly ? "本次生成的图片会出现在这里。" : "生成后的图片会出现在这里。");
      const colCount = Math.max(1, Math.min(10, Number(state.waterfallCols) || 4));
      waterfallEl.style.setProperty("--photo-cols", String(colCount));
      galleryCount.textContent = state.editMode ? `已选 ${selectedImages.size} / ${images.length}` : `${images.length} 张`;
      gallerySelectAll.hidden = !state.editMode;
      gallerySelectAll.textContent = selectedImages.size === images.length && images.length > 0 ? "取消全选" : "全选";
      gallerySelectAll.disabled = images.length < 1;
      galleryEdit.textContent = state.editMode ? "完成" : "编辑";
      galleryDelete.hidden = !state.editMode;
      galleryDelete.disabled = selectedImages.size < 1;
      if (!images.length) {
        waterfallEl.innerHTML = `<div class="empty">${emptyText}</div>`;
        return;
      }
      waterfallEl.innerHTML = `
        <div class="photo-grid">
          ${images.map(record => `
            <button class="photo-item ${selectedImages.has(imageKey(record.image)) ? "selected" : ""}" type="button" data-filename="${escapeHtml(imageKey(record.image))}" aria-label="查看原图">
              <img src="${escapeHtml(record.image.url)}" alt="生成图片" loading="lazy">
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderGalleryShell() {
      const isVideo = state.galleryTab === "videos";
      const isFavorites = state.galleryTab === "favorites";
      galleryMediaTabs.forEach(tab => tab.classList.toggle("active", tab.dataset.galleryTab === state.galleryTab));
      waterfallEl.hidden = isVideo;
      videoWaterfallEl.hidden = !isVideo;
      gallerySessionOnly.hidden = isFavorites;
      gallerySessionOnly.classList.toggle("active", state.sessionOnly && !isFavorites);
      gallerySelectAll.hidden = !state.editMode;
      galleryEdit.hidden = false;
      galleryDelete.hidden = !state.editMode;
      if (isVideo) galleryCount.textContent = "0 个视频";
    }

    function switchGalleryTab(name) {
      state.galleryTab = ["images", "videos", "favorites"].includes(name) ? name : "images";
      renderWaterfall();
    }

    async function loadGallery() {
      try {
        await loadFavorites();
        const [imageData, videoData] = await Promise.all([
          requestJson("/random_photo_prompt/mobile/gallery"),
          requestJson("/random_photo_prompt/mobile/videos").catch(() => ({videos: []}))
        ]);
        state.galleryImages = imageData.images || [];
        state.galleryVideos = videoData.videos || [];
        const visibleImages = imageRecords().map(record => record.image);
        const visibleVideos = videoRecords().map(record => record.video);
        state.selectedImages = new Set([...state.selectedImages].filter(filename => visibleImages.some(image => imageKey(image) === filename)));
        state.selectedVideos = new Set([...state.selectedVideos].filter(filename => visibleVideos.some(video => video.filename === filename)));
        state.selectedFavorites = new Set([...state.selectedFavorites].filter(filename => state.favoriteImages.some(image => imageKey(image) === filename)));
        if (state.sourceImage?.filename) {
          const sourceKey = imageKey(state.sourceImage);
          const fresh = state.galleryImages.find(image => imageKey(image) === sourceKey);
          if (fresh) state.sourceImage = fresh;
        }
        updateSourcePicker();
        renderWaterfall();
      } catch (error) {
        const target = state.galleryTab === "videos" ? videoWaterfallEl : waterfallEl;
        target.innerHTML = `<div class="empty">${error.message}</div>`;
      }
    }

    function switchTab(name) {
      state.tab = name;
      tabs.forEach(tab => tab.classList.toggle("active", tab.dataset.tab === name));
      generatePanel.hidden = name !== "generate";
      waterfallPanel.hidden = name !== "waterfall";
      if (name === "waterfall") loadGallery();
    }

    async function openSourceDialog() {
      await loadGallery();
      if (!state.galleryImages.length) {
        setStatus("瀑布流里还没有可选图片。", true);
        return;
      }
      sourceGrid.innerHTML = state.galleryImages.map(image => `
        <button class="source-choice" type="button" data-filename="${escapeHtml(imageKey(image))}" aria-label="选择图片">
          <img src="${image.url}" alt="">
        </button>
      `).join("");
      sourceDialog.classList.add("open");
      sourceDialog.setAttribute("aria-hidden", "false");
    }

    function closeSourceDialog() {
      sourceDialog.classList.remove("open");
      sourceDialog.setAttribute("aria-hidden", "true");
    }

    function showViewerImage(index) {
      const images = activeImageRecords();
      if (!images.length) return;
      state.viewerMediaType = "image";
      viewer.classList.remove("video-mode");
      viewerRotate.hidden = false;
      viewerCopyPrompt.hidden = false;
      resetViewerScroll();
      state.viewerIndex = (index + images.length) % images.length;
      const record = images[state.viewerIndex];
      const prompt = record.job.prompt || mediaPrompt(record.image);
      viewerVideo.pause();
      viewerVideo.removeAttribute("src");
      viewerImage.src = record.image.url;
      viewerPrompt.textContent = prompt;
      viewerCount.textContent = `${state.viewerIndex + 1} / ${images.length}`;
      viewerDelete.dataset.filename = imageKey(record.image);
      viewerCopyPrompt.dataset.prompt = prompt;
      updateViewerFavoriteButton(record);
      state.viewerRotation = 0;
      resetViewerLayout();
      resetViewerImage();
      resetViewerScroll();
    }

    function showViewerVideo(index) {
      const videos = videoRecords();
      if (!videos.length) return;
      state.viewerMediaType = "video";
      viewer.classList.add("video-mode");
      viewerRotate.hidden = true;
      viewerFavorite.hidden = true;
      viewerFavorite.classList.remove("active");
      viewerCopyPrompt.hidden = false;
      resetViewerScroll();
      state.viewerIndex = (index + videos.length) % videos.length;
      const record = videos[state.viewerIndex];
      viewerImage.removeAttribute("src");
      viewerIncomingImage.removeAttribute("src");
      viewerIncomingImage.removeAttribute("data-index");
      viewerVideo.src = record.video.url;
      viewerPrompt.textContent = record.prompt || mediaPrompt(record.video);
      const resolution = record.video.width && record.video.height ? ` · ${record.video.width}x${record.video.height}` : "";
      viewerCount.textContent = `${state.viewerIndex + 1} / ${videos.length}${resolution}`;
      viewerDelete.dataset.filename = videoKey(record.video);
      viewerCopyPrompt.dataset.prompt = record.prompt || mediaPrompt(record.video);
      state.viewerRotation = 0;
      resetViewerLayout();
      resetViewerScroll();
    }

    function resetViewerScroll() {
      viewer.scrollTop = 0;
      window.requestAnimationFrame(() => {
        viewer.scrollTop = 0;
      });
    }

    function currentViewerTransform(dx) {
      const rotate = state.viewerRotation ? ` rotate(${state.viewerRotation}deg)` : "";
      const scaleValue = state.viewerLayoutScale * state.viewerScale;
      const scale = scaleValue !== 1 ? ` scale(${scaleValue})` : "";
      const x = dx + state.viewerOffsetX;
      const y = state.viewerBaseOffsetY + state.viewerOffsetY;
      return `translate3d(${x}px, ${y}px, 0)${rotate}${scale}`;
    }

    function resetViewerLayout() {
      state.viewerScale = 1;
      state.viewerLayoutScale = 1;
      state.viewerOffsetX = 0;
      state.viewerOffsetY = 0;
      state.viewerBaseOffsetY = 0;
      state.viewerRenderedWidth = 0;
      state.viewerRenderedHeight = 0;
      state.viewerViewportHeight = 0;
      viewerImage.style.width = "";
      viewerImageBox.style.height = "";
    }

    function updateViewerLayout() {
      const availableWidth = Math.max(1, viewerImageBox.clientWidth - 20);
      const browserHeight = window.visualViewport?.height || viewer.clientHeight || window.innerHeight || 1;
      const viewportHeight = Math.max(1, browserHeight - 20);
      const naturalWidth = viewerImage.naturalWidth || viewerImage.clientWidth || availableWidth;
      const naturalHeight = viewerImage.naturalHeight || viewerImage.clientHeight || availableWidth;
      const rotatedSideways = state.viewerRotation % 180 !== 0;
      const baseScale = Math.min(
        1,
        availableWidth / Math.max(1, naturalWidth),
        viewportHeight / Math.max(1, naturalHeight)
      );
      const displayWidth = Math.max(1, Math.floor(naturalWidth * baseScale));
      const renderedHeight = Math.max(1, Math.floor(naturalHeight * baseScale));
      state.viewerLayoutScale = 1;
      state.viewerBaseOffsetY = 0;
      state.viewerOffsetX = 0;
      state.viewerOffsetY = 0;
      state.viewerRenderedWidth = displayWidth;
      state.viewerRenderedHeight = renderedHeight;
      state.viewerViewportHeight = viewportHeight;
      viewerImage.style.width = `${displayWidth}px`;
      if (rotatedSideways) {
        state.viewerLayoutScale = Math.min(
          1,
          availableWidth / Math.max(1, renderedHeight),
          viewportHeight / Math.max(1, displayWidth)
        );
        const visualHeight = displayWidth * state.viewerLayoutScale;
        state.viewerBaseOffsetY = (visualHeight - renderedHeight) / 2;
        state.viewerViewportHeight = Math.max(1, renderedHeight, visualHeight);
        viewerImageBox.style.height = `${state.viewerViewportHeight + 4}px`;
      } else {
        state.viewerScale = 1;
        state.viewerViewportHeight = Math.max(1, renderedHeight);
        viewerImageBox.style.height = `${state.viewerViewportHeight + 4}px`;
      }
      viewerImage.style.transform = currentViewerTransform(0);
    }

    function setViewerImageOffset(dx, animated = false) {
      const transition = animated ? "transform 180ms cubic-bezier(.2, .75, .2, 1)" : "none";
      viewerImage.style.transition = transition;
      viewerIncomingImage.style.transition = transition;
      viewerImage.style.transform = currentViewerTransform(dx);
    }

    function resetViewerImage(animated = false) {
      setViewerImageOffset(0, animated);
      viewerIncomingImage.style.opacity = "0";
      viewerIncomingImage.style.transform = "";
      viewerIncomingImage.removeAttribute("data-index");
    }

    function previewViewerSwipe(dx) {
      if (state.viewerMediaType === "video") return;
      const images = activeImageRecords();
      if (images.length < 2) {
        setViewerImageOffset(dx, false);
        return;
      }
      const width = viewer.clientWidth || window.innerWidth || 360;
      const direction = dx < 0 ? 1 : -1;
      const nextIndex = (state.viewerIndex + direction + images.length) % images.length;
      const nextRecord = images[nextIndex];
      if (viewerIncomingImage.dataset.index !== String(nextIndex)) {
        viewerIncomingImage.src = nextRecord.image.url;
        viewerIncomingImage.dataset.index = String(nextIndex);
      }
      viewerImage.style.transition = "none";
      viewerIncomingImage.style.transition = "none";
      viewerImage.style.transform = currentViewerTransform(dx);
      viewerIncomingImage.style.opacity = "1";
      viewerIncomingImage.style.transform = `translate3d(${direction * width + dx}px, 0, 0)`;
    }

    function animateViewerSwitch(direction) {
      if (state.viewerMediaType === "video") return;
      const images = activeImageRecords();
      if (images.length < 2) return;
      const width = viewer.clientWidth || window.innerWidth || 360;
      const nextIndex = (state.viewerIndex + direction + images.length) % images.length;
      viewerIncomingImage.src = images[nextIndex].image.url;
      viewerIncomingImage.style.opacity = "1";
      viewerImage.style.transition = "none";
      viewerIncomingImage.style.transition = "none";
      viewerIncomingImage.style.transform = `translate3d(${direction * width}px, 0, 0)`;
      window.requestAnimationFrame(() => {
        viewerImage.style.transition = "transform 180ms cubic-bezier(.2, .75, .2, 1)";
        viewerIncomingImage.style.transition = "transform 180ms cubic-bezier(.2, .75, .2, 1)";
        viewerImage.style.transform = currentViewerTransform(-direction * width);
        viewerIncomingImage.style.transform = "translate3d(0, 0, 0)";
      });
      window.setTimeout(() => {
        showViewerImage(nextIndex);
        viewerIncomingImage.removeAttribute("src");
        viewerIncomingImage.removeAttribute("data-index");
        resetViewerImage(false);
      }, 180);
    }

    function openViewer(index) {
      viewer.classList.add("open");
      viewer.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      resetViewerScroll();
      showViewerImage(index);
    }

    function openVideoViewer(index) {
      viewer.classList.add("open");
      viewer.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      resetViewerScroll();
      showViewerVideo(index);
    }

    function closeViewer() {
      viewer.classList.remove("open");
      viewer.setAttribute("aria-hidden", "true");
      viewer.classList.remove("video-mode");
      viewerImage.removeAttribute("src");
      viewerIncomingImage.removeAttribute("src");
      viewerIncomingImage.removeAttribute("data-index");
      viewerVideo.pause();
      viewerVideo.removeAttribute("src");
      viewerVideo.load();
      viewerImage.style.transition = "";
      viewerImage.style.transform = "";
      viewerIncomingImage.style.transition = "";
      viewerIncomingImage.style.transform = "";
      viewerIncomingImage.style.opacity = "";
      state.viewerRotation = 0;
      state.viewerMediaType = "image";
      viewerFavorite.hidden = false;
      viewerFavorite.classList.remove("active");
      viewerFavorite.textContent = "收藏";
      viewerCopyPrompt.hidden = false;
      viewerRotate.hidden = false;
      resetViewerScroll();
      resetViewerLayout();
      viewerDelete.removeAttribute("data-filename");
      viewerCopyPrompt.removeAttribute("data-prompt");
      document.body.style.overflow = "";
    }

    function askConfirm(message) {
      confirmMessage.textContent = message;
      confirmDialog.classList.add("open");
      confirmDialog.setAttribute("aria-hidden", "false");
      return new Promise(resolve => {
        const cleanup = result => {
          confirmDialog.classList.remove("open");
          confirmDialog.setAttribute("aria-hidden", "true");
          confirmCancel.removeEventListener("click", onCancel);
          confirmOk.removeEventListener("click", onOk);
          confirmDialog.removeEventListener("click", onBackdrop);
          resolve(result);
        };
        const onCancel = () => cleanup(false);
        const onOk = () => cleanup(true);
        const onBackdrop = event => {
          if (event.target === confirmDialog) cleanup(false);
        };
        confirmCancel.addEventListener("click", onCancel);
        confirmOk.addEventListener("click", onOk);
        confirmDialog.addEventListener("click", onBackdrop);
      });
    }

    async function deleteImages(keys) {
      const uniqueKeys = [...new Set(keys.filter(Boolean))];
      if (!uniqueKeys.length) return false;
      const ok = await askConfirm(`删除 ${uniqueKeys.length} 张图片？`);
      if (!ok) return false;
      await requestJson("/random_photo_prompt/mobile/gallery/delete", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({items: uniqueKeys.map(key => ({...imageByKey(key), key}))})
      });
      uniqueKeys.forEach(key => state.selectedImages.delete(key));
      await loadGallery();
      return true;
    }

    async function deleteVideos(filenames) {
      const unique = [...new Set(filenames.filter(Boolean))];
      if (!unique.length) return false;
      const ok = await askConfirm(`删除 ${unique.length} 个视频？`);
      if (!ok) return false;
      await requestJson("/random_photo_prompt/mobile/videos/delete", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({items: unique.map(filename => ({filename}))})
      });
      unique.forEach(filename => state.selectedVideos.delete(filename));
      await loadGallery();
      return true;
    }

    async function deleteFavorites(filenames) {
      const unique = [...new Set(filenames.filter(Boolean))];
      if (!unique.length) return false;
      const ok = await askConfirm(`移除 ${unique.length} 张收藏？`);
      if (!ok) return false;
      await favoriteDbTransaction("readwrite", store => {
        unique.forEach(filename => store.delete(filename));
      });
      unique.forEach(filename => state.selectedFavorites.delete(filename));
      await loadFavorites();
      renderWaterfall();
      return true;
    }

    async function copyPromptText(text) {
      const value = String(text || "").trim();
      if (!value) {
        setStatus("当前没有可复制的提示词。", true);
        return;
      }
      try {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(value);
        } else {
          const textarea = document.createElement("textarea");
          textarea.value = value;
          textarea.style.position = "fixed";
          textarea.style.opacity = "0";
          document.body.appendChild(textarea);
          textarea.focus();
          textarea.select();
          document.execCommand("copy");
          textarea.remove();
        }
        setStatus("提示词已复制");
      } catch (error) {
        setStatus("复制失败，手机浏览器没有授权剪贴板。", true);
      }
    }

    jobsEl.addEventListener("click", event => {
      const button = event.target.closest(".thumb");
      if (!button) return;
      const images = imageRecords();
      const index = images.findIndex(record => record.job.prompt_id === button.dataset.promptId && record.index === Number(button.dataset.imageIndex));
      if (index >= 0) openViewer(index);
    });

    waterfallEl.addEventListener("click", event => {
      if (state.galleryTab === "videos") return;
      if (ignoreNextGalleryClick) {
        ignoreNextGalleryClick = false;
        return;
      }
      const button = event.target.closest(".photo-item");
      if (!button) return;
      const filename = button.dataset.filename;
      if (state.editMode) {
        toggleGalleryItem(button);
        return;
      }
      const images = activeImageRecords();
      const index = images.findIndex(record => imageKey(record.image) === filename);
      if (index >= 0) openViewer(index);
    });

    videoWaterfallEl.addEventListener("click", event => {
      if (state.galleryTab !== "videos") return;
      if (ignoreNextGalleryClick) {
        ignoreNextGalleryClick = false;
        return;
      }
      const button = event.target.closest(".video-item");
      if (!button) return;
      const filename = button.dataset.filename;
      if (state.editMode) {
        toggleGalleryItem(button);
        return;

      const extraX = Math.max(0, (visualWidth - boxWidth) / 2);
